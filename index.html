<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exile Flip — Path of Exile Currency Flipper</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <main class="app">
    <header class="app__header">
      <h1 class="app__title">Exile Flip</h1>
      <p class="app__subtitle">Divination Card Price Flipper</p>
    </header>

    <section class="controls">
      <div class="search-box">
        <div class="search-box__field">
          <input
            type="text"
            id="searchInput"
            class="search-box__input"
            placeholder="Search divination cards..."
            autocomplete="off"
          >
          <ul id="cardSuggestions" class="suggestions" hidden></ul>
        </div>
        <button id="checkPricesBtn" class="button button--primary">
          Check Prices
        </button>
        <button id="viewAllBtn" class="button button--primary">
          View All Flips
        </button>
      </div>

    </section>

    <section class="status">
      <p id="statusMessage" class="status__message"></p>
      <div class="league-selector">
        <label for="leagueSelect" class="league-selector__label">League:</label>
        <select id="leagueSelect" class="league-selector__select"></select>
      </div>
    </section>

    <section class="results">
      <div id="noResults" class="results__empty">
        <p>No results found. Try adjusting your filters.</p>
      </div>

      <table id="resultsTable" class="results__table" style="display: none;">
        <thead>
          <tr class="table__header">
            <th class="table__cell table__cell--name">Card Name</th>
            <th class="table__cell table__cell--stack">Stack</th>
            <th class="table__cell table__cell--buy">Per Card</th>
            <th class="table__cell table__cell--total">Full Set Cost</th>
            <th class="table__cell table__cell--reward">Reward</th>
            <th class="table__cell table__cell--profit">Profit</th>
          </tr>
        </thead>
        <tbody id="resultsBody">
        </tbody>
      </table>
    </section>

    <section class="history">
      <h2 class="history__title">Recent Searches</h2>
      <div id="historyList" class="history__list"></div>
      <button id="clearHistoryBtn" class="button button--secondary">
        Clear History
      </button>
    </section>
  </main>

  <script src="src/data.js"></script>
  <script src="src/utils.js"></script>
  <script src="src/api.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
